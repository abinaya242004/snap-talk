<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Chat bubble (circle with tail) -->
  <circle cx="32" cy="29" r="16" fill="url(#bubble)"/>
  <!-- Bubble tail pointing bottom-left -->
  <path d="M24 42 Q20 46 16 48 Q21 44 23 40Z" fill="url(#bubble)"/>

  <!-- Heart icon inside bubble (white) -->
  <path d="M32 35 C32 35 24 30 24 25.5 C24 23 26 21.5 28 21.5 C30 21.5 31.5 23 32 24 C32.5 23 34 21.5 36 21.5 C38 21.5 40 23 40 25.5 C40 30 32 35 32 35Z" fill="white" opacity="0.95"/>
</svg>